services:
  opencode-web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${OPENCODE_PORT}:${OPENCODE_PORT}"
      - "${OPENCODE_PORT_RANGE_START}-${OPENCODE_PORT_RANGE_END}:${OPENCODE_PORT_RANGE_START}-${OPENCODE_PORT_RANGE_END}"
    volumes:
      # Workspace directory (donde estarán tus proyectos)
      - ${WORKSPACE_PATH}/workspace:/workspace
      # Archivos de configuración y estado persistente
      - ${WORKSPACE_PATH}/data/config:/root/.config/opencode
      - ${WORKSPACE_PATH}/data/share:/root/.local/share/opencode
    environment:
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_PASSWORD}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_USER}
      - OPENCODE_HOSTNAME=0.0.0.0
      - OPENCODE_PORT=${OPENCODE_PORT}
      # Opcional: configuraciones de LLM (puedes ponerlas aquí o configurarlas en la UI)
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    working_dir: /workspace
